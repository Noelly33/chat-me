worker_processes auto;

events {
    worker_connections 4096;
}

http {
    map $http_authorization $bearer_token {
        default "";
        "~^Bearer\s+(?<t>.+)$" $t;
    }

    map $http_cookie $cookie_token {
        default "";
        "~*chat_auth=(?<t>[^;]+)" $t;
    }

    map "$bearer_token:$cookie_token" $jwt_token {
        default $cookie_token;
        "~^[^:]+:" $bearer_token;
    }

    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream ws_nodes {
        zone ws_nodes 64k;
        least_conn;
        server ws-node-1:4001 resolve;
        server ws-node-2:4001 resolve;
        server ws-node-3:4001 resolve;

        keepalive 32;
    }

    upstream auth_api {
        zone auth_api 64k;
        server sidecar-auth-api:5016 resolve;
        keepalive 16;
    }

    upstream messages_api {
        zone messages_api 64k;
        server core-mensajes-api:5017 resolve;
        keepalive 16;
    }

    upstream frontend {
        zone frontend 64k;
        server frontend:80 resolve;
        keepalive 16;
    }

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    server {
        
        listen 80;
        server_name livechatme.tech www.livechatme.tech;
        
        location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }

       
    }
    server {
        listen 443 ssl;
        server_name livechatme.tech www.livechatme.tech;
        ssl_certificate /etc/letsencrypt/live/livechatme.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/livechatme.tech/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers auto;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location = /internal/auth {
            internal;

            proxy_http_version 1.1;
            proxy_method POST;
            proxy_set_body '{"header":{"TransactionId":"nginx-sidecar","Timestamp":"$time_iso8601","Device":"nginx"},"data":{"token":"$jwt_token"}}';
            proxy_set_header   Content-Type "application/json";

            proxy_pass         http://auth_api/api/v1/auth/validate;
        }

        location /api/v1/auth/register {
            proxy_pass         http://auth_api;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/v1/auth/login {
            proxy_pass         http://auth_api;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/v1/auth/refresh {
            proxy_pass         http://auth_api;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/v1/auth/logout {
            proxy_pass         http://auth_api;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/v1/auth/profile {
            auth_request       /internal/auth;

            auth_request_set   $auth_user_id  $upstream_http_x_user_id;
            auth_request_set   $auth_username $upstream_http_x_username;
            auth_request_set   $auth_email    $upstream_http_x_email;

            proxy_pass         http://auth_api;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-User-Id         $auth_user_id;
            proxy_set_header   X-Username        $auth_username;
            proxy_set_header   X-Email           $auth_email;
        }

        location /api/v1/messages {
            auth_request       /internal/auth;

            auth_request_set   $auth_user_id  $upstream_http_x_user_id;
            auth_request_set   $auth_username $upstream_http_x_username;
            auth_request_set   $auth_email    $upstream_http_x_email;

            proxy_pass         http://messages_api;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-User-Id         $auth_user_id;
            proxy_set_header   X-Username        $auth_username;
            proxy_set_header   X-Email           $auth_email;
        }

        location /api/v1/contacts {
            auth_request       /internal/auth;

            auth_request_set   $auth_user_id  $upstream_http_x_user_id;
            auth_request_set   $auth_username $upstream_http_x_username;
            auth_request_set   $auth_email    $upstream_http_x_email;

            proxy_pass         http://messages_api;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-User-Id         $auth_user_id;
            proxy_set_header   X-Username        $auth_username;
            proxy_set_header   X-Email           $auth_email;
        }

        location /api/v1/contacts/search {
            auth_request       /internal/auth;

            auth_request_set   $auth_user_id  $upstream_http_x_user_id;
            auth_request_set   $auth_username $upstream_http_x_username;
            auth_request_set   $auth_email    $upstream_http_x_email;

            proxy_pass         http://messages_api;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-User-Id         $auth_user_id;
            proxy_set_header   X-Username        $auth_username;
            proxy_set_header   X-Email           $auth_email;
        }

        location /api/v1/conversations {
            auth_request       /internal/auth;

            auth_request_set   $auth_user_id  $upstream_http_x_user_id;
            auth_request_set   $auth_username $upstream_http_x_username;
            auth_request_set   $auth_email    $upstream_http_x_email;

            proxy_pass         http://messages_api;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-User-Id         $auth_user_id;
            proxy_set_header   X-Username        $auth_username;
            proxy_set_header   X-Email           $auth_email;
        }

        location /ws {
            auth_request       /internal/auth;

            auth_request_set   $auth_user_id  $upstream_http_x_user_id;
            auth_request_set   $auth_username $upstream_http_x_username;
            auth_request_set   $auth_email    $upstream_http_x_email;

            proxy_pass         http://ws_nodes;
            proxy_http_version 1.1;

            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_set_header   X-User-Id         $auth_user_id;
            proxy_set_header   X-Username        $auth_username;
            proxy_set_header   X-Email           $auth_email;

            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 10s;

            proxy_buffering off;
        }

        location /health {
            proxy_pass         http://ws_nodes;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
        }

        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        error_page 401 = @error_401;
        location @error_401 {
            default_type application/json;
            add_header   Cache-Control "no-store";
            return 401 '{"error":"Unauthorized"}';
        }

        error_page 502 503 504 = @error_upstream;
        location @error_upstream {
            default_type application/json;
            return 503 '{"error":"Service unavailable"}';
        }
    }
}

name: chat-me

services:


  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  sidecar-auth-api:
    build:
      context: ./SideCar.Auth.Api
    restart: unless-stopped
    environment:
      ConnectionStrings__PostgresConnection: ${POSTGRES_CONNECTION}
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER:-SideCar.Auth.Api}
      JwtSettings__Audience: ${JWT_AUDIENCE:-SideCar.Auth.Clients}
      JwtSettings__AccessTokenExpirationInMinutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-15}
      JwtSettings__RefreshTokenExpirationInDays: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-7}
      JwtSettings__AuthCookieName: ${AUTH_COOKIE_NAME:-chat_auth}
      JwtSettings__RefreshCookieName: ${REFRESH_COOKIE_NAME:-chat_refresh}
      JwtSettings__CookieSameSite: ${COOKIE_SAME_SITE:-Lax}
      JwtSettings__CookieSecureOnly: ${COOKIE_SECURE_ONLY:-true}
    networks:
      - internal

  core-mensajes-api:
    build:
      context: ./Core.Mensajes.Api
    restart: unless-stopped
    environment:
      ConnectionStrings__PostgresConnection: ${POSTGRES_CONNECTION}
    networks:
      - internal

  ws-node-1:
    build:
      context: ./websocket-server
    restart: unless-stopped
    environment:
      PORT: "4001"
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost}
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ws-node-2:
    build:
      context: ./websocket-server
    restart: unless-stopped
    environment:
      PORT: "4001"
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost}
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ws-node-3:
    build:
      context: ./websocket-server
    restart: unless-stopped
    environment:
      PORT: "4001"
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost}
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  messaging-worker:
    build:
      context: ./Consumer.Messaging.Worker
    restart: unless-stopped
    environment:
      ConnectionStrings__PostgresConnection: ${POSTGRES_CONNECTION}
      ConnectionStrings__Redis: redis:6379
      RabbitMq__Host: rabbitmq
      RabbitMq__VirtualHost: /
      RabbitMq__Username: guest
      RabbitMq__Password: guest
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./client
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /var/www/certbot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - internal
    depends_on:
      - frontend
      - sidecar-auth-api
      - core-mensajes-api
      - ws-node-1
      - ws-node-2
      - ws-node-3

networks:
  internal:
    driver: bridge

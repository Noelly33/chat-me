worker_processes auto;

events {
    worker_connections 4096;
}

http {
    upstream ws_nodes {
        least_conn;
        server ws-node-1:4001;
        server ws-node-2:4001;
        server ws-node-3:4001;

        keepalive 32;
    }

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    server {
        listen 80;
        server_name _;

        location = /internal/auth {
            internal;
            proxy_pass              http://auth-sidecar:3000/auth;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length   "";

            proxy_set_header        X-Original-URI   $request_uri;

            proxy_set_header        Authorization    $http_authorization;
        }

        location /ws {

            auth_request /internal/auth;


            auth_request_set $auth_username $upstream_http_x_username;

            proxy_pass         http://ws_nodes;
            proxy_http_version 1.1;

            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_set_header   X-Username        $auth_username;

            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 10s;


            proxy_buffering off;
        }

        location /health {
            proxy_pass         http://ws_nodes;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
        }

        error_page 401 = @error_401;
        location @error_401 {
            default_type application/json;
            add_header   Cache-Control "no-store";
            return 401 '{"error":"Unauthorized"}';
        }

        error_page 502 503 504 = @error_upstream;
        location @error_upstream {
            default_type application/json;
            return 503 '{"error":"Service unavailable"}';
        }
    }
}
